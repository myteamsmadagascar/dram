<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Connexion - DramaGasy Live</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:450px;
background:#111;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(229,9,20,.2);
}

.logo{
width:180px;
display:block;
margin:auto;
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#ccc;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#222;
color:white;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#e50914;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.link{
display:block;
text-align:center;
margin-top:15px;
color:#ff4444;
text-decoration:none;
font-weight:bold;
}

.info{
margin-top:20px;
text-align:center;
color:#999;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<a href="index.html">
<img src="logo.png" class="logo">
</a>

<h1>Connexion</h1>

<div class="subtitle">
Accédez à vos séries et films
</div>

<input
type="tel"
id="telephone"
placeholder="Téléphone">

<input
type="password"
id="motdepasse"
placeholder="Mot de passe">

<button onclick="login()">
🔑 SE CONNECTER
</button>

<a href="motdepasse-oublie.html" class="link">
🔑 Mot de passe oublié ?
</a>

<a href="register.html" class="link">
📝 Créer un compte
</a>

<a href="index.html" class="link">
🏠 Retour à l'accueil
</a>

<div class="info">
DramaGasy Live © 2026
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwagwZP8cFFUDFtlK9JjbqyNHZjHCupdQYdmzV4VsW0WjL1ZfZPEUOeEXtkCrbvan0T/exec";

async function login(){

const telephone =
document.getElementById("telephone").value.trim();

const motdepasse =
document.getElementById("motdepasse").value.trim();

if(!telephone || !motdepasse){

alert("Veuillez remplir tous les champs");
return;

}

try{

const response = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"login",
telephone:telephone,
motdepasse:motdepasse
})
});

const result = await response.json();

if(result.success){

localStorage.setItem(
"userId",
result.userId
);

localStorage.setItem(
"userName",
result.nom
);

localStorage.setItem(
"userSolde",
result.solde
);

window.location =
"dashboard.html";

}else{

alert(result.message);

}

}catch(error){

alert(
"Erreur de connexion : " +
error
);

}

}

</script>

</body>
</html>
