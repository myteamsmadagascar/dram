<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>DramaGasy Live - Lecteur</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
color:white;
}

.header{
background:#111;
padding:15px;
text-align:center;
}

.logo{
height:70px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.titre{
font-size:30px;
font-weight:bold;
text-align:center;
color:#d60000;
margin-bottom:20px;
}

video{
width:100%;
border-radius:15px;
background:#000;
}

.bloc{
background:#111;
padding:15px;
border-radius:15px;
margin-top:20px;
}

.description{
line-height:1.6;
color:#ddd;
}

.duree{
margin-top:10px;
color:#00ff66;
font-weight:bold;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:#d60000;
color:white;
}

.loader{
text-align:center;
padding:50px;
font-size:22px;
}

</style>

</head>
<body>

<div class="header">

<img src="logo.png" class="logo">

</div>

<div class="container">

<div id="titre" class="titre">
Chargement...
</div>

<video
id="videoPlayer"
controls
controlsList="nodownload">

<source
id="videoSource"
src=""
type="video/mp4">

Votre navigateur ne supporte pas la vidéo.

</video>

<div class="bloc">

<div id="description" class="description">
Chargement...
</div>

<div id="duree" class="duree"></div>

</div>

<button
class="btn"
onclick="history.back()">

⬅ Retour aux épisodes

</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwlIGCXP8487ohPDZXP_BxPRKrQK9IwQoJLW9PXmPJbJ8B21b-9oxBZpKpj6Qv6qpE-/exec";

const episodeId =
localStorage.getItem("episodeId");

if(!episodeId){

alert("Episode introuvable");

history.back();

}

chargerEpisode();

async function chargerEpisode(){

try{

const rep = await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"getEpisode",
episodeId:episodeId
})
});

const data =
await rep.json();

if(!data.success){

alert("Episode introuvable");

return;

}

document.getElementById("titre").innerHTML =
data.episode.titre;

document.getElementById("description").innerHTML =
data.episode.description;

document.getElementById("duree").innerHTML =
"⏱ Durée : " +
data.episode.duree;

let videoUrl =
data.episode.video;

if(videoUrl.includes("drive.google.com/file/d/")){

const id =
videoUrl.split("/d/")[1]
.split("/")[0];

videoUrl =
"https://drive.google.com/uc?export=download&id=" + id;

}

document.getElementById("videoSource").src =
videoUrl;

document.getElementById("videoPlayer").load();

}catch(err){

document.getElementById("titre").innerHTML =
"Erreur";

alert(err);

}

}

</script>

</body>
</html>
